server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Service worker: nunca cachear, para que atualizações cheguem na hora
    # (evita browser/Cloudflare servirem um SW antigo).
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        default_type application/javascript;
    }

    # Manifest com o Content-Type correto (ajuda o Chrome a reconhecer o PWA).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # index.html sempre revalidado: os assets têm hash no nome, então servir
    # um index velho = app velho (o Safari do iOS cacheia HTML sem cabeçalho).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Necessário para Single Page Applications (SPA) como React/Vite
    # Garante que as rotas feitas no frontend não retornem erro 404
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Assets com hash no nome: imutáveis, cache longo.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
